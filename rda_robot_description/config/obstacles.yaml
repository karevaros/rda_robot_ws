# 작업 공간 · 장애물 환경 정의 (4주차)
#
# 좌표계 통일 규칙
#   · 모든 좌표는 `frame`(기본 world) 기준. **world 의 z=0 이 바닥면**이다.
#     launch 가 world → base_link 를 z=+0.23479 로 발행한다(URDF 에서 유도).
#       ⚠ base_link 는 바닥이 아니다 — base_footprint 가 base_link 아래 0.23479 m
#         (바퀴 최저점 -0.2352). 이 오프셋 없이 base_link 를 원점에 두면 로봇이 파묻힌다.
#     모바일 베이스가 실제로 주행하면 world → base_link 를 odom/localization 이 대체한다.
#     장애물은 world 에 고정 → 로봇이 움직여도 따라오지 않는다.
#   · 길이 m, 각도 rad(rpy). pose.xyz = 형상 중심(center).
#
# world 기준 주요 높이 (실측)
#   바닥 z=0 · 플랫폼 상면 z=0.351 · 팔 베이스(link0) z=0.335 · 홈포즈 tcp z=1.432
#   Scout 본체 실측: 0.930(X) x 0.700(Y, 바퀴포함), 본체 x=±0.465 · y=±0.35
#
# 종류(kind)
#   obstacle : 실제 물체. 충돌 회피 대상(플래닝 시 collision object).
#   keepout  : 물리적 실체가 없는 이동 제한 영역(가상 벽). 충돌 회피 대상.
#
# type: box(size xyz) | cylinder(radius,height) | sphere(radius)
#
# ※ 온실·작물 3D 모델링은 4주차 범위 밖 — 일반 테스트 객체로 구성(계획서 명시).

frame: world

# ── 작업 공간: 팔 tcp 가 머물러야 하는 영역 ───────────────────────────────
# 기구학 분석(docs/기구학-분석.md): 팔 베이스 world z=0.335, tcp 최대반경 1.102 m.
workspace:
  center: [0.0, 0.0, 1.04]
  size: [2.4, 2.4, 1.40]      # tcp 도달 범위(1.102 m 반경)를 감싸는 박스

# ── 장애물 · 제한 영역 ────────────────────────────────────────────────────
obstacles:
  # [이동 제한] 바닥면.
  #  자충돌 모니터는 링크↔링크만 검사한다. 바닥은 URDF 에 링크가 없어
  #  검출 대상이 아니다 → 명시적 장애물로 넣어야 팔의 바닥 관통을 막는다.
  #  (기구학 분석: 무작위 자세 샘플의 27.0% 가 tcp z<0)
  #  ※ 바퀴 4개는 설계상 이 면에 닿는다(정상 접촉) → SRDF ACM 에서
  #    ground_plane ↔ base_link/wheel_* 를 allow 해야 오탐이 안 난다.
  - name: ground_plane
    kind: keepout
    type: box
    pose: {xyz: [0.0, 0.0, -0.05], rpy: [0.0, 0.0, 0.0]}
    size: [6.0, 6.0, 0.10]     # 상면이 정확히 z=0
    color: [0.50, 0.50, 0.50, 0.25]

  # ※ 모바일 플랫폼 상판은 여기에 넣지 않는다 — 의도적 제외.
  #    상판은 `base_link` 의 실제 URDF geometry(실측: 0.930 x 0.700 m, 상면 z=0.116)라
  #    MoveIt 이 이미 로봇 자체 형상으로 충돌 검사한다(SRDF/ACM). 장애물로 또 넣으면
  #    같은 물체를 이중으로 세어 과도하게 제약된다.
  #    바닥(ground_plane)만 링크가 없어 별도 선언이 필요한 것.

  # ── 일반 테스트 객체 ────────────────────────────────────────────────────
  # 팔 정면 작업대 (도달권 안, 경로계획 테스트용).
  #  ⚠ x 는 로봇 몸체를 피해야 한다: Scout 앞면 x=0.465 → 여유 0.10 두고
  #    작업대 앞면 0.565 → 중심 0.82(깊이 0.5). 처음에 0.60 으로 뒀다가
  #    작업대가 로봇 안에 박혀 시작자세부터 충돌(=플래닝 자체가 실패)했음.
  - name: table
    kind: obstacle
    type: box
    pose: {xyz: [0.82, 0.0, 0.35], rpy: [0.0, 0.0, 0.0]}
    size: [0.50, 0.80, 0.70]     # 상면 z=0.70
    color: [0.55, 0.35, 0.20, 0.90]

  # 작업대 위 기둥 장애물 — 경로가 우회해야 하는 대상 (작업대 상면 0.70 에 세움)
  - name: pillar
    kind: obstacle
    type: cylinder
    pose: {xyz: [0.75, 0.20, 0.85], rpy: [0.0, 0.0, 0.0]}
    radius: 0.05
    height: 0.30                 # z 0.70~1.00
    color: [0.20, 0.40, 0.85, 0.90]

  # 집기 대상 후보 (작업대 상면 0.70 위에 얹힘)
  - name: target_ball
    kind: obstacle
    type: sphere
    pose: {xyz: [0.80, -0.20, 0.74]}
    radius: 0.04
    color: [0.90, 0.15, 0.15, 0.90]

  # 측면 벽 — 좌측 작업영역 경계 (로봇 y=±0.35 밖)
  - name: side_wall
    kind: obstacle
    type: box
    pose: {xyz: [0.0, 0.85, 0.60], rpy: [0.0, 0.0, 0.0]}
    size: [1.60, 0.06, 1.20]
    color: [0.60, 0.60, 0.65, 0.60]
